<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フラサ グスティ アッロー - 宿命の対決 -</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a1a1a; --bg-color: #f7f9fa; --card-bg: #ffffff; --accent-a: #2b5c8f; --accent-b: #8f2b3e; --gold: #d4af37; --border-radius: 16px; }
        body { font-family: 'Noto Serif JP', serif; background-color: var(--bg-color); color: var(--primary-color); text-align: center; padding: 20px 15px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 40px; }
        h1 { font-family: 'Yuji Syuku', serif; font-size: clamp(2em, 5vw, 2.5em); margin: 10px 0 30px; color: var(--primary-color); letter-spacing: 0.1em; position: relative; display: inline-block; }
        h1::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background-color: var(--gold); border-radius: 2px; }
        .battle-inputs { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 600px) { .battle-inputs { flex-direction: row; } }
        .player-box { background: var(--card-bg); padding: 25px 20px; border-radius: var(--border-radius); flex: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border-top: 4px solid #ccc; transition: transform 0.3s; }
        .player-box:hover { transform: translateY(-2px); }
        .player-a-box { border-top-color: var(--accent-a); }
        .player-b-box { border-top-color: var(--accent-b); }
        .player-box h2 { margin: 0 0 15px 0; font-size: 1.1em; font-weight: 700; }
        .player-a-color { color: var(--accent-a); }
        .player-b-color { color: var(--accent-b); }
        .input-wrapper { position: relative; width: 100%; }
        input[type="password"], input[type="text"] { font-size: 1rem; padding: 15px; padding-right: 50px; width: 100%; box-sizing: border-box; border: 1px solid #e0e0e0; border-radius: 8px; font-family: inherit; background-color: #fafafa; outline: none; }
        .eye-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; opacity: 0.5; padding: 5px; }
        .action-btn { font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 1.1rem; padding: 15px 30px; width: 100%; max-width: 350px; cursor: pointer; background-color: var(--primary-color); color: white; border: none; border-radius: 30px; margin: 10px auto; display: block; }
        .action-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #btn-score { background-color: var(--gold); color: #000; }
        #status { font-size: 0.9rem; color: #666; margin: 15px 0; height: 1.5em; }
        .battle-results { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        @media (min-width: 768px) { .battle-results { flex-direction: row; align-items: flex-start;} }
        .result-box { background: var(--card-bg); border-radius: var(--border-radius); padding: 30px 20px; flex: 1; display: none; }
        .brush-text { font-family: 'Yuji Syuku', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); line-height: 1.6; color: #000; margin: 25px 0; padding: 20px 10px; background: rgba(0,0,0,0.02); border-radius: 8px; text-align: center; }
        .score-box { margin: 12px 0; text-align: left; font-size: 0.95rem; line-height: 1.5; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .score-title { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 6px; color: var(--primary-color); }
        .score-value { font-weight: bold; font-size: 1.1em; }
        .score-comment { color: #555; font-size: 0.85em; }
        .total-score { font-family: 'Yuji Syuku', serif; font-size: 2.5rem; margin: 25px 0 10px; font-weight: bold; border-top: 1px solid #ddd; padding-top: 20px; }
        #winner-announcement { display: none; font-family: 'Yuji Syuku', serif; font-size: clamp(2rem, 6vw, 3.5rem); color: var(--gold); margin: 50px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>フラサ グスティ アッロー</h1>

        <div class="battle-inputs" id="input-section">
            <div class="player-box player-a-box">
                <h2 class="player-a-color">プレイヤーA</h2>
                <div class="input-wrapper">
                    <input type="text" id="kaminoku-a" placeholder="上の句を入力（例: 静けさや）">
                    <span class="eye-icon" onclick="toggleEye('kaminoku-a', this)">🙈</span>
                </div>
            </div>
            <div class="player-box player-b-box">
                <h2 class="player-b-color">プレイヤーB</h2>
                <div class="input-wrapper">
                    <input type="text" id="kaminoku-b" placeholder="上の句を入力（例: 夏草や）">
                    <span class="eye-icon" onclick="toggleEye('kaminoku-b', this)">🙈</span>
                </div>
            </div>
        </div>

        <button id="btn-generate" class="action-btn" onclick="generateBattleShimonokus()">両者の下の句を詠む</button>
        <div id="status"></div>

        <div id="winner-announcement"></div>
        <button id="btn-score" class="action-btn" onclick="getBattleScoring()" style="display:none;">両者の句を評価・判定する</button>

        <div class="battle-results">
            <div class="result-box" id="result-box-a">
                <h3 class="player-a-color" style="margin-top:0;">プレイヤーAの句</h3>
                <div class="brush-text" id="full-poem-a"></div>
                <div id="score-area-a" style="display:none;" class="score-list">
                    <div id="score-details-a"></div>
                    <div class="total-score player-a-color" id="total-result-a"></div>
                </div>
            </div>
            <div class="result-box" id="result-box-b">
                <h3 class="player-b-color" style="margin-top:0;">プレイヤーBの句</h3>
                <div class="brush-text" id="full-poem-b"></div>
                <div id="score-area-b" style="display:none;" class="score-list">
                    <div id="score-details-b"></div>
                    <div class="total-score player-b-color" id="total-result-b"></div>
                </div>
            </div>
        </div>
        <button id="btn-reload" class="action-btn" onclick="location.reload()" style="display:none; margin-top:40px; background-color:#555;">次の試合へ</button>
    </div>

    <script>
        let currentKaminokuA = ""; let currentShimonokuA = "";
        let currentKaminokuB = ""; let currentShimonokuB = "";

        function toggleEye(inputId, iconElement) {
            const input = document.getElementById(inputId);
            if (input.type === "text") { input.type = "password"; iconElement.innerText = "👁️"; } 
            else { input.type = "text"; iconElement.innerText = "🙈"; }
        }

        async function callAI(prompt) {
            const response = await fetch('/api/gemini', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt })
            });
            if (!response.ok) { throw new Error(`制限を超えました。約40秒待ってから再度お試しください。`); }
            const data = await response.json();
            let rawText = data.candidates[0].content.parts[0].text;
            rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
            return JSON.parse(rawText);
        }

        // ★変更点：AとBの下の句を「1回のお願い」でまとめて作らせる！
        function createCombinedGenPrompt(inputA, inputB) {
            return `あなたは雅で少しカオスな歌人です。2人のプレイヤーが上の句を詠みました。
            プレイヤーA: 「${inputA}」
            プレイヤーB: 「${inputB}」
            それぞれに続く、衝撃的でエモい「下の句」を一つずつ生成してください。
            返信は以下のJSON形式のみで行ってください。
            {
              "shimonokuA": "プレイヤーAの下の句",
              "shimonokuB": "プレイヤーBの下の句"
            }`;
        }

        // ★変更点：AとBの採点も「1回のお願い」でまとめてやらせる！
        function createCombinedScorePrompt(kamiA, shimoA, kamiB, shimoB) {
            return `あなたは「フラサ グスティ アッロー」の非常に厳格で毒舌な審査員AIです。
            忖度やお世辞は一切不要です。凡庸な句には容赦なく低い点数をつけ、辛辣で小馬鹿にした毒舌コメントで斬り捨ててください。本当に素晴らしい場合のみ絶賛してください。
            以下の2つの句をそれぞれ5項目（各10点満点）で採点し、日本語のJSONで返してください。
            プレイヤーAの句: 「${kamiA} ${shimoA}」
            プレイヤーBの句: 「${kamiB} ${shimoB}」
            形式：
            {
              "playerA": { "scores": {"芸術点": {"score": 2, "comment": "凡庸です。"}, "知的点": {"score": 1, "comment": "意味不明です。"}, "インパク点": {"score": 8, "comment": "不快です。"}, "運命点": {"score": 0, "comment": "出会うべきではなかった。"}, "エモ点": {"score": 9, "comment": "狂気に惹かれます。"}} },
              "playerB": { "scores": {"芸術点": {"score": 2, "comment": "凡庸です。"}, "知的点": {"score": 1, "comment": "意味不明です。"}, "インパク点": {"score": 8, "comment": "不快です。"}, "運命点": {"score": 0, "comment": "出会うべきではなかった。"}, "エモ点": {"score": 9, "comment": "狂気に惹かれます。"}} }
            }`;
        }

        async function generateBattleShimonokus() {
            const inputA = document.getElementById("kaminoku-a").value;
            const inputB = document.getElementById("kaminoku-b").value;
            if (!inputA || !inputB) return alert("両プレイヤーとも上の句を入力してください！");
            currentKaminokuA = inputA; currentKaminokuB = inputB;
            const status = document.getElementById("status");
            const btnGen = document.getElementById("btn-generate");
            const btnScore = document.getElementById("btn-score");
            status.innerText = "AIが両者の下の句を同時に思考中...";
            btnGen.disabled = true;
            
            try {
                // 1回の通信でAとBをまとめて生成
                const result = await callAI(createCombinedGenPrompt(currentKaminokuA, currentKaminokuB));
                currentShimonokuA = result.shimonokuA;
                currentShimonokuB = result.shimonokuB;
                
                document.getElementById("full-poem-a").innerText = `${currentKaminokuA}　${currentShimonokuA}`;
                document.getElementById("full-poem-b").innerText = `${currentKaminokuB}　${currentShimonokuB}`;
                document.getElementById("result-box-a").style.display = "block";
                document.getElementById("result-box-b").style.display = "block";
                status.innerText = "両者の句が完成しました！";
                btnGen.style.display = "none";
                btnScore.style.display = "block";
                document.getElementById("input-section").style.display = "none";
            } catch (e) {
                alert(e.message); btnGen.disabled = false; status.innerText = "エラーのため停止しました。";
            }
        }

        function buildScoreHtml(scoresObj) {
            let html = ""; let total = 0;
            for (const key in scoresObj) {
