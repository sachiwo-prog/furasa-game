<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>フラサ グスティ アッロー - オンライン対戦 -</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a1a1a; --bg-color: #f7f9fa; --card-bg: #ffffff; --accent-a: #2b5c8f; --accent-b: #8f2b3e; --gold: #d4af37; --border-radius: 16px; }
        body { font-family: 'Noto Serif JP', serif; background-color: var(--bg-color); color: var(--primary-color); text-align: center; padding: 20px 15px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; padding-bottom: 40px; }
        h1 { font-family: 'Yuji Syuku', serif; font-size: clamp(2em, 5vw, 2.5em); margin: 10px 0 20px; color: var(--primary-color); letter-spacing: 0.1em; position: relative; display: inline-block; }
        h1::after { content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background-color: var(--gold); border-radius: 2px; }
        
        /* ロビー（部屋作り）画面 */
        #lobby-section { background: var(--card-bg); padding: 40px 20px; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 30px; }
        .room-input { font-size: 1.2rem; padding: 12px; width: 150px; text-align: center; letter-spacing: 0.2em; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        .divider { margin: 30px 0; border-bottom: 1px dashed #ccc; position: relative; }
        .divider span { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--card-bg); padding: 0 15px; color: #888; font-size: 0.9em; }
        
        /* ゲーム画面（対戦中） */
        #game-section { display: none; margin-top: 20px; }
        .room-info { background: #333; color: #fff; padding: 10px 20px; border-radius: 30px; display: inline-block; margin-bottom: 25px; font-weight: bold; letter-spacing: 0.05em; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .room-info span { color: var(--gold); font-size: 1.2em; margin-left: 10px; }
        
        .battle-inputs { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 600px) { .battle-inputs { flex-direction: row; } }
        
        .player-box { background: var(--card-bg); padding: 25px 20px; border-radius: var(--border-radius); flex: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border-top: 4px solid #ccc; position: relative; }
        .player-a-box { border-top-color: var(--accent-a); }
        .player-b-box { border-top-color: var(--accent-b); }
        .player-box h2 { margin: 0 0 15px 0; font-size: 1.1em; font-weight: 700; }
        .player-a-color { color: var(--accent-a); }
        .player-b-color { color: var(--accent-b); }
        
        input[type="text"], input[type="password"] { font-size: 1rem; padding: 15px; width: 100%; box-sizing: border-box; border: 1px solid #e0e0e0; border-radius: 8px; font-family: inherit; background-color: #fafafa; outline: none; transition: 0.3s; text-align: center;}
        input:focus { background-color: #fff; border-color: #aaa; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        input:disabled { background-color: #eee; color: #888; cursor: not-allowed; }
        
        .ready-badge { position: absolute; top: -15px; right: -10px; background: #28a745; color: white; font-size: 0.8rem; font-weight: bold; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transform: rotate(10deg); display: none; }
        
        .action-btn { font-family: 'Noto Serif JP', serif; font-weight: 700; font-size: 1.1rem; padding: 15px 30px; width: 100%; max-width: 350px; cursor: pointer; background-color: var(--primary-color); color: white; border: none; border-radius: 30px; margin: 10px auto; display: block; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .action-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); background-color: #333; }
        .action-btn:disabled { background-color: #ccc; cursor: not-allowed; box-shadow: none; transform: none; }
        
        #btn-submit { background-color: var(--gold); color: #000; }
        #btn-submit:hover:not(:disabled) { background-color: #c5a02c; }
        
        #status { font-size: 1rem; color: #111; margin: 20px 0; height: 1.5em; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        
        .battle-results { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        @media (min-width: 768px) { .battle-results { flex-direction: row; align-items: flex-start;} }
        .result-box { background: var(--card-bg); border-radius: var(--border-radius); padding: 30px 20px; flex: 1; display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .brush-text { font-family: 'Yuji Syuku', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); line-height: 1.6; color: #000; margin: 25px 0; padding: 20px 10px; background: rgba(0,0,0,0.02); border-radius: 8px; text-align: center; }
        .score-box { margin: 12px 0; text-align: left; font-size: 0.95rem; line-height: 1.5; padding-bottom: 10px; border-bottom: 1px dashed #eee; }
        .score-title { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 6px; color: var(--primary-color); }
        .score-value { font-weight: bold; font-size: 1.1em; }
        .score-comment { color: #555; font-size: 0.85em; }
        .total-score { font-family: 'Yuji Syuku', serif; font-size: 2.5rem; margin: 25px 0 10px; font-weight: bold; border-top: 1px solid #ddd; padding-top: 20px; }
        #winner-announcement { display: none; font-family: 'Yuji Syuku', serif; font-size: clamp(2rem, 6vw, 3.5rem); color: var(--gold); margin: 50px 0; animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>フラサ グスティ アッロー</h1>

        <div id="lobby-section">
            <h3 style="color:#555; margin-top:0;">オンライン対戦</h3>
            <button class="action-btn" onclick="createRoom()" style="background-color: var(--accent-a);">＋ 新しい部屋を作る<br><small>（あなたがプレイヤーAになります）</small></button>
            
            <div class="divider"><span>または</span></div>
            
            <input type="text" id="join-room-id" class="room-input" placeholder="合言葉 (4桁)" maxlength="4">
            <button class="action-btn" onclick="joinRoom()" style="background-color: var(--accent-b);">➜ 部屋に入る<br><small>（あなたがプレイヤーBになります）</small></button>
            <div id="lobby-error" style="color: red; margin-top: 10px; font-size: 0.9em;"></div>
        </div>

        <div id="game-section">
            <div class="room-info">部屋の合言葉: <span id="display-room-id">----</span></div>
            <p style="font-weight: bold; font-size: 1.2em; margin-bottom: 20px;">あなたは <span id="my-role-display"></span> です</p>

            <div class="battle-inputs" id="input-section">
                <div class="player-box player-a-box">
                    <h2 class="player-a-color">プレイヤーA</h2>
                    <div id="ready-badge-a" class="ready-badge">詠み完了</div>
                    <input type="password" id="kaminoku-a" placeholder="上の句を入力">
                </div>
                <div class="player-box player-b-box">
                    <h2 class="player-b-color">プレイヤーB</h2>
                    <div id="ready-badge-b" class="ready-badge">詠み完了</div>
                    <input type="password" id="kaminoku-b" placeholder="上の句を入力">
                </div>
            </div>

            <button id="btn-submit" class="action-btn" onclick="submitKaminoku()">上の句を詠む（準備完了）</button>
            <div id="status">相手の入力を待っています...</div>

            <div id="winner-announcement"></div>
            
            <div class="battle-results">
                <div class="result-box" id="result-box-a">
                    <h3 class="player-a-color" style="margin-top:0;">プレイヤーAの句</h3>
                    <div class="brush-text" id="full-poem-a"></div>
                    <div id="score-area-a" style="display:none;" class="score-list">
                        <div id="score-details-a"></div>
                        <div class="total-score player-a-color" id="total-result-a"></div>
                    </div>
                </div>
                <div class="result-box" id="result-box-b">
                    <h3 class="player-b-color" style="margin-top:0;">プレイヤーBの句</h3>
                    <div class="brush-text" id="full-poem-b"></div>
                    <div id="score-area-b" style="display:none;" class="score-list">
                        <div id="score-details-b"></div>
                        <div class="total-score player-b-color" id="total-result-b"></div>
                    </div>
                </div>
            </div>
            <button id="btn-reload" class="action-btn" onclick="location.reload()" style="display:none; margin-top:40px; background-color:#555;">トップに戻る</button>
        </div>
    </div>

    <script type="module">
        // Firebaseのモジュールを読み込む
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // ★いただいた設定情報をここにセット！
        const firebaseConfig = {
            apiKey: "AIzaSyCGNQ-l0LyurZSbOnxySRFVHJYLykm0qLc",
            authDomain: "furasa-game.firebaseapp.com",
            databaseURL: "https://furasa-game-default-rtdb.firebaseio.com", // 念のため追加
            projectId: "furasa-game",
            storageBucket: "furasa-game.firebasestorage.app",
            messagingSenderId: "1091848528817",
            appId: "1:1091848528817:web:33e8b8aa3b189beadc5390"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 自分の状態（AかBか）と部屋番号を保存する変数
        let myRole = ""; 
        let currentRoom = "";
        let isProcessingAPI = false; // AI呼び出しの重複防止

        // ==========================================
        // 1. ロビー機能（部屋を作る・入る）
        // ==========================================
        window.createRoom = async () => {
            // 4桁のランダムな合言葉を生成
            currentRoom = Math.floor(1000 + Math.random() * 9000).toString();
            myRole = "A";
            
            // データベースに部屋の初期データを書き込む
            await set(ref(db, 'rooms/' + currentRoom), {
                status: "waiting", // waiting -> playing -> generating -> scoring -> finished
                kaminokuA: "", kaminokuB: "",
                readyA: false, readyB: false,
                resultData: null
            });
            
            startGameUI();
        };

        window.joinRoom = async () => {
            const inputId = document.getElementById("join-room-id").value;
            if (inputId.length !== 4) return alert("4桁の合言葉を入力してください");
            
            // 部屋が存在するか確認
            const snapshot = await get(ref(db, 'rooms/' + inputId));
            if (snapshot.exists()) {
                currentRoom = inputId;
                myRole = "B";
                // プレイヤーBが入室したので、ステータスをplayingにする
                await update(ref(db, 'rooms/' + currentRoom), { status: "playing" });
                startGameUI();
            } else {
                document.getElementById("lobby-error").innerText = "その部屋は見つかりません。合言葉を確認してください。";
            }
        };

        // 画面の切り替え設定
        function startGameUI() {
            document.getElementById("lobby-section").style.display = "none";
            document.getElementById("game-section").style.display = "block";
            document.getElementById("display-room-id").innerText = currentRoom;
            
            const roleColor = myRole === "A" ? "var(--accent-a)" : "var(--accent-b)";
            document.getElementById("my-role-display").innerHTML = `<strong style="color:${roleColor}; font-size:1.5em;">プレイヤー${myRole}</strong>`;
            
            // 自分の入力欄だけ有効にして、テキストが見えるようにする
            const myInput = document.getElementById(`kaminoku-${myRole.toLowerCase()}`);
            const otherInput = document.getElementById(`kaminoku-${myRole === "A" ? "b" : "a"}`);
            
            myInput.type = "text";
            myInput.placeholder = "あなたの上の句を入力";
            
            otherInput.disabled = true;
            otherInput.placeholder = "相手が入力中...";

            // 部屋のデータをリアルタイム監視開始！
            listenToRoom();
        }

        // ==========================================
        // 2. 準備完了（詠む）ボタンの処理
        // ==========================================
        window.submitKaminoku = async () => {
            const myInput = document.getElementById(`kaminoku-${myRole.toLowerCase()}`).value;
            if (!myInput) return alert("上の句を入力してください！");
            
            document.getElementById("btn-submit").disabled = true;
            document.getElementById(`kaminoku-${myRole.toLowerCase()}`).disabled = true;

            // 自分が入力した句と、「準備完了」フラグをFirebaseに保存
            const updateData = {};
            updateData[`kaminoku${myRole}`] = myInput;
            updateData[`ready${myRole}`] = true;
            await update(ref(db, 'rooms/' + currentRoom), updateData);
        };

        // ==========================================
        // 3. リアルタイム通信（相手の動きを監視する）
        // ==========================================
        function listenToRoom() {
            onValue(ref(db, 'rooms/' + currentRoom), async (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                const statusEl = document.getElementById("status");

                // --- UIの更新 ---
                if (data.status === "waiting") {
                    statusEl.innerText = "プレイヤーBの参加を待っています...";
                }
                
                if (data.status === "playing") {
                    if (data.readyA) document.getElementById("ready-badge-a").style.display = "block";
                    if (data.readyB) document.getElementById("ready-badge-b").style.display = "block";
                    
                    if ((myRole === "A" && data.readyA) || (myRole === "B" && data.readyB)) {
                        statusEl.innerText = "相手の入力を待っています...";
                    } else {
                        statusEl.innerText = "上の句を詠んでください！";
                    }
                }

                if (data.status === "generating") statusEl.innerText = "AIが両者の下の句を思考中...";
                if (data.status === "scoring") statusEl.innerText = "AIが両者を容赦なく審査中...";
                
                // --- AIを動かす処理（★プレイヤーAのスマホだけが代表してAIを呼ぶ） ---
                if (data.readyA && data.readyB && data.status === "playing" && myRole === "A" && !isProcessingAPI) {
                    isProcessingAPI = true;
                    await update(ref(db, 'rooms/' + currentRoom), { status: "generating" });
                    executeAIGeneration(data.kaminokuA, data.kaminokuB);
                }
                
                // --- 結果の表示処理（AもBも両方動く） ---
                if (data.status === "scoring" || data.status === "finished") {
                    document.getElementById("input-section").style.display = "none";
                    document.getElementById("btn-submit").style.display = "none";
                    
                    if (data.resultData && data.resultData.shimonoku) {
                        document.getElementById("full-poem-a").innerText = `${data.kaminokuA}　${data.resultData.shimonoku.A}`;
                        document.getElementById("full-poem-b").innerText = `${data.kaminokuB}　${data.resultData.shimonoku.B}`;
                        document.getElementById("result-box-a").style.display = "block";
                        document.getElementById("result-box-b").style.display = "block";
                    }
                }
                
                if (data.status === "finished" && data.resultData && data.resultData.scores) {
                    displayFinalResults(data.resultData.scores);
                    statusEl.style.display = "none";
                }
            });
        }

        // ==========================================
        // 4. AIとの通信部分（エコモード安全装置版）
        // ==========================================
        async function callVercelAPI(prompt) {
            const response = await fetch('/api/gemini', {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            if (!response.ok) throw new Error("通信エラー");
            
            const rawText = data.candidates[0].content.parts[0].text;
            const jsonMatch = rawText.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("解析エラー");
            return JSON.parse(jsonMatch[0]);
        }

        // プレイヤーAが代表して実行する一連のAI処理
        async function executeAIGeneration(kamiA, kamiB) {
            try {
                // 1. 下の句を生成
                const genPrompt = `あなたは雅でカオスな歌人です。以下の2人の上の句に続く「下の句」を生成しJSONで返してください。
                A:「${kamiA}」 B:「${kamiB}」
                形式: {"A": "Aの下の句", "B": "Bの下の句"}`;
                
                const shimoResult = await callVercelAPI(genPrompt);
                
                // Firebaseに下の句を保存し、ステータスを「審査中(scoring)」に進める
                await update(ref(db, 'rooms/' + currentRoom), { 
                    status: "scoring",
                    "resultData/shimonoku": shimoResult
                });

                // 2. 審査を実行
                const scorePrompt = `あなたは「フラサ グスティ アッロー」の毒舌審査員AIです。忖度なく、凡庸な句には低い点数と辛辣なコメントを。
                A:「${kamiA} ${shimoResult.A}」 B:「${kamiB} ${shimoResult.B}」
                5項目（各10点）で採点しJSONで返してください。
                形式: {"A": {"芸術点":{"score":2,"comment":"凡庸"}, "知的点":{"score":1,"comment":"謎"}, "インパク点":{"score":8,"comment":"不快"}, "運命点":{"score":0,"comment":"最悪"}, "エモ点":{"score":9,"comment":"狂気"}}, "B": {同様の構成}}`;
                
                const scoreResult = await callVercelAPI(scorePrompt);

                // Firebaseに審査結果を保存し、ステータスを「完了(finished)」にする
                await update(ref(db, 'rooms/' + currentRoom), { 
                    status: "finished",
                    "resultData/scores": scoreResult
                });

            } catch (error) {
                console.error(error);
                alert("AIの処理中にエラーが発生しました。トップに戻ってやり直してください。");
            }
        }

        // ==========================================
        // 5. 最終結果の画面表示
        // ==========================================
        function buildScoreHtml(scoresObj) {
            let html = ""; let total = 0;
            if (!scoresObj) return { html: "<p>審査不能</p>", total: 0 };
            for (const key in scoresObj) {
                if (scoresObj[key] && scoresObj[key].score !== undefined) {
                    const score = Number(scoresObj[key].score) || 0;
                    html += `<div class="score-box"><div class="score-title"><span>${key}</span><span class="score-value">${score} / 10</span></div><div class="score-comment">${scoresObj[key].comment}</div></div>`;
                    total += score;
                }
            }
            return { html, total };
        }

        function displayFinalResults(scores) {
            const aData = buildScoreHtml(scores.A);
            const bData = buildScoreHtml(scores.B);
            
            document.getElementById("score-details-a").innerHTML = aData.html;
            document.getElementById("total-result-a").innerText = `${aData.total} 点`;
            document.getElementById("score-area-a").style.display = "block";
            
            document.getElementById("score-details-b").innerHTML = bData.html;
            document.getElementById("total-result-b").innerText = `${bData.total} 点`;
            document.getElementById("score-area-b").style.display = "block";
            
            let winnerText = "";
            if (aData.total > bData.total) winnerText = "👑 プレイヤーAの勝利";
            else if (bData.total > aData.total) winnerText = "👑 プレイヤーBの勝利";
            else winnerText = "🤝 引き分け";
            
            const announce = document.getElementById("winner-announcement");
            announce.innerText = winnerText; 
            announce.style.display = "block";
            
            document.getElementById("btn-reload").style.display = "block";
        }
    </script>
</body>
</html>
